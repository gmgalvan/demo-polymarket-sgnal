apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-neuron-tinyllama-1b
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-neuron-tinyllama-1b
  template:
    metadata:
      labels:
        app: vllm-neuron-tinyllama-1b
    spec:
      nodeSelector:
        workload: neuron
      tolerations:
        - key: aws.amazon.com/neuron
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: aws.amazon.com/neuroncore
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm-neuron
          # vLLM Neuron requires a custom image built from AWS Neuron DLC and pushed to ECR.
          # Replace this value with your own ECR URI before scaling replicas > 0.
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/vllm-neuron:latest
          imagePullPolicy: IfNotPresent
          args:
            - --model=TinyLlama/TinyLlama-1.1B-Chat-v1.0
            - --served-model-name=tinyllama-1b-neuron
            - --tokenizer-mode=slow
            - --host=0.0.0.0
            - --port=8000
            - --device=neuron
            - --tensor-parallel-size=1
            - --max-model-len=512
            - --max-num-seqs=1
            - --block-size=2048
            - --swap-space=0
            - --download-dir=/models
            - --guided-decoding-backend=lm-format-enforcer
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "1500m"
              memory: "10Gi"
              aws.amazon.com/neuroncore: "1"
            limits:
              cpu: "3"
              aws.amazon.com/neuroncore: "1"
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 180
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-neuron-tinyllama-1b
spec:
  selector:
    app: vllm-neuron-tinyllama-1b
  ports:
    - name: http
      port: 8000
      targetPort: http
