# Local development: runs the 3 MCP servers + ChromaDB vector store
# The agents container runs separately (or directly via python demo/trigger_local.py)
#
# Usage:
#   docker compose up                    # start all services
#   docker compose up technical-analysis # start only one
#   docker compose up chromadb           # start only vector DB
#   docker compose logs -f polymarket    # tail logs

services:

  polymarket:
    build:
      context: .
      dockerfile: services/polymarket/Dockerfile
    image: polymarket-mcp:local
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/sse')"]
      interval: 30s
      timeout: 5s
      retries: 3

  technical-analysis:
    build:
      context: .
      dockerfile: services/technical_analysis/Dockerfile
    image: ta-mcp:local
    ports:
      - "8002:8002"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  web-search:
    build:
      context: .
      dockerfile: services/web_search/Dockerfile
    image: web-search-mcp:local
    ports:
      - "8003:8003"
    environment:
      - PYTHONUNBUFFERED=1
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8004:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
