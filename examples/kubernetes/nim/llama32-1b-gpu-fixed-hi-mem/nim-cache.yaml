apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: llama32-1b-instruct-fixed-hi-mem-cache
spec:
  nodeSelector:
    workload: gpu-fixed-hi-mem
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  source:
    ngc:
      modelPuller: nvcr.io/nim/meta/llama-3.2-1b-instruct:1.12.0
      pullSecret: ngc-secret
      authSecret: ngc-api-secret
      model:
        engine: vllm
        tensorParallelism: "1"
  storage:
    pvc:
      create: true
      storageClass: efs-sc-nim
      size: 20Gi
      volumeAccessMode: ReadWriteMany
