apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: llama32-1b-instruct-fixed
  labels:
    app.kubernetes.io/name: nim
    app.kubernetes.io/instance: llama32-1b-instruct-fixed
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: demo-examples
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  image:
    repository: nvcr.io/nim/meta/llama-3.2-1b-instruct
    tag: "1.12.0"
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-secret
  authSecret: ngc-api-secret
  env:
    - name: NIM_MAX_MODEL_LEN
      value: "4096"
  storage:
    nimCache:
      name: llama32-1b-instruct-fixed-cache
    readOnly: false
  nodeSelector:
    workload: gpu-fixed
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  resources:
    requests:
      cpu: "2"
      memory: "8Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "4"
      memory: "12Gi"
      nvidia.com/gpu: "1"
  replicas: 1
  expose:
    service:
      type: ClusterIP
      port: 8000
