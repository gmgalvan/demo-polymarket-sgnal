# ── NIMService ────────────────────────────────────────────────────────────────
# NIMService deploys a NIM microservice pod that:
#   1. Mounts the NIMCache PVC (model weights, already downloaded)
#   2. Starts a TensorRT-LLM engine from the cached weights
#   3. Exposes an OpenAI-compatible HTTP API on port 8000
#
# The NIM Operator translates this CRD into a Deployment + Service + HPA.
# You never write those resources manually — the operator owns them.
#
# This NIMService lands on the dedicated NIM GPU Karpenter NodePool because:
#   - nodeSelector: workload=gpu-nim → matches NodePool label
#   - tolerations: nvidia.com/gpu → matches NodePool taint
#   - resources: nvidia.com/gpu:1 → triggers Karpenter to provision a GPU node
#
# The agent (LiteLLM gateway) reaches this service at:
#   http://llama31-8b-instruct:8000/v1/chat/completions
# with model name "meta/llama-3.1-8b-instruct"
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: llama31-8b-instruct
  labels:
    app.kubernetes.io/name: nim
    app.kubernetes.io/instance: llama31-8b-instruct
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: demo-examples
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  image:
    repository: nvcr.io/nim/meta/llama-3.1-8b-instruct
    tag: "2.0.3"
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-secret
  authSecret: ngc-api-secret
  env:
    - name: NIM_MAX_MODEL_LEN
      value: "32768"
  storage:
    nimCache:
      name: llama31-8b-instruct-cache
      profile: "a28963301b18077db3454d5eb21f5678304936c5a425ddc552443de1f5449f2a"
    readOnly: false

  # ── Scheduling: GPU node (Karpenter NodePool gpu-nim) ───────────────────────
  nodeSelector:
    workload: gpu-nim
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule

  # ── Resources ────────────────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "4"
      memory: "16Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "8"
      memory: "24Gi"
      nvidia.com/gpu: "1"

  # ── Serving config ───────────────────────────────────────────────────────────
  replicas: 1

  # ── Expose as ClusterIP Service ───────────────────────────────────────────────
  expose:
    service:
      type: ClusterIP
      port: 8000
