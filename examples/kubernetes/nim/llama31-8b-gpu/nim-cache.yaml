# ── NIMCache ──────────────────────────────────────────────────────────────────
# NIMCache pre-downloads the model weights from NGC onto a PersistentVolume
# so that NIMService pods start in seconds instead of re-downloading GBs each time.
#
# The NIM Operator watches this resource, spins up a temporary init job that
# pulls the model from nvcr.io, and marks the cache as Ready when complete.
# The paired NIMService reuses this PVC so it does not have to re-download model
# artifacts on each restart.
#
# Model: meta/llama-3.1-8b-instruct
#   - 8B params, fits on a single 1-GPU node class in this repo
#   - OpenAI-compatible chat endpoint out of the box
#   - Optimized with TensorRT-LLM inside the NIM container
#
# Prerequisites:
#   - NIM Operator installed (lv-4-inference-services)
#   - Secret ngc-api-secret exists in namespace demo-examples
#     kubectl create secret generic ngc-api-secret \
#       --from-literal=NGC_API_KEY=nvapi-xxxx \
#       -n demo-examples
apiVersion: apps.nvidia.com/v1alpha1
kind: NIMCache
metadata:
  name: llama31-8b-instruct-cache
spec:
  nodeSelector:
    workload: gpu-nim
  tolerations:
    - key: nvidia.com/gpu
      operator: Equal
      value: "true"
      effect: NoSchedule
  source:
    ngc:
      # NGC model path — matches the NIM container published by NVIDIA
      modelPuller: nvcr.io/nim/meta/llama-3.1-8b-instruct:2.0.3
      pullSecret: ngc-secret
      # Secret created by lv-4 Terraform (or manually, see README)
      authSecret: ngc-api-secret
      model:
        engine: vllm
        tensorParallelism: "1"
        # Use the exact profile ID from the image manifest for the 24 GB
        # single-GPU vLLM path. Friendly profile aliases are not accepted by
        # this container version for Llama 3.1.
        profiles:
          - a28963301b18077db3454d5eb21f5678304936c5a425ddc552443de1f5449f2a
  storage:
    pvc:
      create: true
      storageClass: efs-sc-nim
      size: 30Gi
      # Shared cache is fine here; NIM docs support RWX PVCs for operator-managed cache.
      volumeAccessMode: ReadWriteMany
