# ── RayService: Llama 3.1 8B on GPU via Ray Serve LLM ────────────────────────
#
# This example follows the current Ray Serve LLM pattern:
#   - import_path: ray.serve.llm:build_openai_app
#   - official `rayproject/ray-llm:*` image
#   - no custom wrapper module and no custom ECR image required
#
# Why this shape:
#   - older examples used a custom `serve_vllm.py` wrapper with
#     `vllm.entrypoints.openai.api_server.app`, which is fragile against modern
#     vLLM releases
#   - the public `rayproject/ray-ml:*` tags referenced by older examples are
#     not the right fit for current Ray Serve LLM deployments
#
# Platform note for this repo:
#   - the cluster has an ARM/core lane, an x86-core lane, and a GPU/x86 lane
#   - the worker runs on the GPU lane
#   - the head is CPU-only but needs an amd64 image, so it runs on x86-core
#
# Prerequisites:
#   1. KubeRay operator installed
#   2. `huggingface-token` secret exists in `demo-examples`
#   3. `gpu-inference` Karpenter NodePool is available
#
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llama3-8b-ray
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: llama3-8b-ray
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: demo-examples
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  # First pull + model download can take several minutes.
  serviceUnhealthySecondThreshold: 1800
  deploymentUnhealthySecondThreshold: 1800

  # Current official OpenAI-compatible Serve LLM entrypoint.
  serveConfigV2: |
    applications:
      - name: llm
        route_prefix: /
        import_path: ray.serve.llm:build_openai_app
        args:
          llm_configs:
            - model_loading_config:
                model_id: llama-3.1-8b-instruct
                model_source: meta-llama/Llama-3.1-8B-Instruct
              accelerator_type: L40S
              deployment_config:
                autoscaling_config:
                  min_replicas: 1
                  max_replicas: 2
                  target_ongoing_requests: 32
                max_ongoing_requests: 128
              engine_kwargs:
                dtype: bfloat16
                max_model_len: 4096
                gpu_memory_utilization: 0.85
                trust_remote_code: false

  rayClusterConfig:
    rayVersion: "2.52.0"
    enableInTreeAutoscaling: true

    headGroupSpec:
      rayStartParams:
        num-cpus: "0"
        num-gpus: "0"
        dashboard-host: "0.0.0.0"
        metrics-export-port: "8080"

      serviceType: ClusterIP

      template:
        metadata:
          labels:
            app: llama3-8b-ray-head
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
            workload: x86-core

          containers:
            - name: ray-head
              image: rayproject/ray-llm:2.52.0-py311-cu128
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 8000
                  name: serve
                  protocol: TCP
                - containerPort: 8080
                  name: metrics
                  protocol: TCP
                - containerPort: 6379
                  name: gcs
                  protocol: TCP
                - containerPort: 8265
                  name: dashboard
                  protocol: TCP
                - containerPort: 10001
                  name: client
                  protocol: TCP
              env:
                - name: HUGGING_FACE_HUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: huggingface-token
                      key: token
              resources:
                requests:
                  cpu: "2"
                  memory: "4Gi"
                limits:
                  cpu: "2"
                  memory: "5Gi"

    workerGroupSpecs:
      - groupName: gpu-workers
        replicas: 1
        minReplicas: 1
        maxReplicas: 2
        numOfHosts: 1

        rayStartParams:
          num-gpus: "1"

        template:
          metadata:
            labels:
              app: llama3-8b-ray-worker
          spec:
            nodeSelector:
              kubernetes.io/arch: amd64
              workload: gpu
            tolerations:
              - key: nvidia.com/gpu
                operator: Equal
                value: "true"
                effect: NoSchedule

            containers:
              - name: ray-worker
                image: rayproject/ray-llm:2.52.0-py311-cu128
                imagePullPolicy: IfNotPresent
                env:
                  - name: HUGGING_FACE_HUB_TOKEN
                    valueFrom:
                      secretKeyRef:
                        name: huggingface-token
                        key: token
                resources:
                  requests:
                    cpu: "4"
                    memory: "16Gi"
                    nvidia.com/gpu: "1"
                  limits:
                    cpu: "6"
                    memory: "20Gi"
                    nvidia.com/gpu: "1"
