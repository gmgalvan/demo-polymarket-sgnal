# ── RayService: TinyLlama 1B on Inferentia2 via AWS blueprint pattern ───────
#
# This example follows the AWS AI on EKS `vllm-rayserve-inf2` blueprint pattern:
#   - RayServe custom wrapper mounted from a ConfigMap
#   - Ray 2.32.0
#   - vLLM v0.5.0 patched for Neuron inside the published AWS image
#   - OpenAI-compatible `/v1/chat/completions` endpoint served through Ray Serve
#
# Differences from the upstream AWS blueprint:
#   - head schedules on this repo's `x86-core` lane instead of AWS's
#     `instanceType: x86-cpu-karpenter`
#   - worker schedules on this repo's `workload=neuron` lane
#   - model and resource settings are reduced for TinyLlama on `inf2.xlarge`
#   - we use `aws.amazon.com/neuroncore` because that is the resource shape
#     exercised elsewhere in this repo
#
# Reference:
#   https://awslabs.github.io/ai-on-eks/docs/blueprints/inference/framework-guides/Neuron/vllm-ray-inf2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tinyllama-neuron-vllm-serve-script
data:
  vllm_serve.py: |
    import logging
    import os
    from typing import List, Optional

    from fastapi import FastAPI
    from ray import serve
    from starlette.requests import Request
    from starlette.responses import JSONResponse, StreamingResponse
    from vllm.engine.arg_utils import AsyncEngineArgs
    from vllm.engine.async_llm_engine import AsyncLLMEngine
    from vllm.entrypoints.openai.protocol import (
        ChatCompletionRequest,
        ChatCompletionResponse,
        ErrorResponse,
    )
    from vllm.entrypoints.openai.serving_chat import OpenAIServingChat
    from vllm.entrypoints.openai.serving_engine import LoRAModulePath
    from vllm.transformers_utils.config import get_config

    logger = logging.getLogger("ray.serve")
    app = FastAPI()

    def get_model_config(model_path: str) -> dict:
        try:
            config = get_config(model_path)
            return {
                "architecture": config.architectures[0] if config.architectures else None,
                "vocab_size": config.vocab_size,
                "hidden_size": config.hidden_size,
                "num_hidden_layers": config.num_hidden_layers,
                "num_attention_heads": config.num_attention_heads,
            }
        except Exception as exc:
            logger.warning("Error reading model config: %s", exc)
            return {}

    @serve.deployment(name="VLLMDeployment")
    @serve.ingress(app)
    class VLLMDeployment:
        def __init__(
            self,
            model: str,
            served_model_name: str,
            tensor_parallel_size: int,
            max_num_seqs: int,
            block_size: int,
            max_model_len: int,
            response_role: str = "assistant",
            lora_modules: Optional[List[LoRAModulePath]] = None,
            chat_template: Optional[str] = None,
        ):
            model_config = get_model_config(model)
            logger.info("Model config: %s", model_config)

            engine_args = AsyncEngineArgs(
                model=model,
                tensor_parallel_size=tensor_parallel_size,
                max_num_seqs=max_num_seqs,
                block_size=block_size,
                max_model_len=max_model_len,
                disable_log_requests=True,
                device="neuron",
                dtype="auto",
                trust_remote_code=False,
            )
            logger.info("Starting with engine args: %s", engine_args)

            self.engine_args = engine_args
            self.served_model_name = served_model_name
            self.response_role = response_role
            self.lora_modules = lora_modules
            self.chat_template = chat_template
            self.openai_serving_chat = None
            self.engine = AsyncLLMEngine.from_engine_args(engine_args)

        @app.get("/v1/models")
        async def get_models(self):
            return JSONResponse(
                content={
                    "object": "list",
                    "data": [
                        {
                            "id": self.served_model_name,
                            "object": "model",
                            "owned_by": "organization",
                            "permission": [],
                        }
                    ],
                }
            )

        @app.post("/v1/chat/completions")
        async def create_chat_completion(
            self, request: ChatCompletionRequest, raw_request: Request
        ):
            if not self.openai_serving_chat:
                model_config = await self.engine.get_model_config()
                served_model_names = [self.served_model_name]
                self.openai_serving_chat = OpenAIServingChat(
                    self.engine,
                    model_config,
                    served_model_names,
                    self.response_role,
                    self.lora_modules,
                    self.chat_template,
                )

            logger.info("Request: %s", request)
            generator = await self.openai_serving_chat.create_chat_completion(
                request, raw_request
            )
            if isinstance(generator, ErrorResponse):
                return JSONResponse(
                    content=generator.model_dump(), status_code=generator.code
                )
            if request.stream:
                return StreamingResponse(
                    content=generator, media_type="text/event-stream"
                )
            assert isinstance(generator, ChatCompletionResponse)
            return JSONResponse(content=generator.model_dump())

    deployment = VLLMDeployment.bind(
        model=os.environ.get("MODEL_ID", "TinyLlama/TinyLlama-1.1B-Chat-v1.0"),
        served_model_name=os.environ.get("SERVED_MODEL_NAME", "tinyllama-1b-neuron"),
        tensor_parallel_size=int(os.environ.get("TENSOR_PARALLELISM", "2")),
        max_num_seqs=int(os.environ.get("MAX_NUM_SEQS", "4")),
        block_size=int(os.environ.get("BLOCK_SIZE", "512")),
        max_model_len=int(os.environ.get("MAX_MODEL_LEN", "512")),
    )

---
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: tinyllama-neuron-ray
  labels:
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: tinyllama-neuron-ray
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: demo-examples
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  serviceUnhealthySecondThreshold: 2700
  deploymentUnhealthySecondThreshold: 2700
  serveConfigV2: |
    applications:
      - name: vllm
        import_path: vllm_serve:deployment
        route_prefix: "/"
        runtime_env:
          env_vars:
            MODEL_ID: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
            SERVED_MODEL_NAME: "tinyllama-1b-neuron"
            TENSOR_PARALLELISM: "2"
            BLOCK_SIZE: "512"
            MAX_MODEL_LEN: "512"
            MAX_NUM_SEQS: "4"
            PORT: "8000"
            NEURON_CC_FLAGS: "-O1"
            LD_LIBRARY_PATH: "/home/ray/anaconda3/lib:$LD_LIBRARY_PATH"
            NEURON_RT_LOG_LEVEL: "INFO"
        deployments:
          - name: VLLMDeployment
            autoscaling_config:
              min_replicas: 1
              max_replicas: 1
              target_num_ongoing_requests_per_replica: 1
            ray_actor_options:
              num_cpus: 2
              resources: {"neuron_cores": 2}
              runtime_env:
                env_vars:
                  LD_LIBRARY_PATH: "/home/ray/anaconda3/lib:$LD_LIBRARY_PATH"
  rayClusterConfig:
    rayVersion: "2.32.0"
    enableInTreeAutoscaling: true
    headGroupSpec:
      rayStartParams:
        dashboard-host: "0.0.0.0"
        metrics-export-port: "8080"
        num-cpus: "0"
      serviceType: ClusterIP
      template:
        metadata:
          labels:
            app: tinyllama-neuron-ray-head
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
            workload: x86-core
          containers:
            - name: ray-head
              image: public.ecr.aws/data-on-eks/vllm-ray2.32.0-inf2-llama3:latest
              imagePullPolicy: Always
              lifecycle:
                preStop:
                  exec:
                    command: ["/bin/sh", "-c", "ray stop"]
              ports:
                - containerPort: 6379
                  name: gcs
                - containerPort: 8265
                  name: dashboard
                - containerPort: 10001
                  name: client
                - containerPort: 8000
                  name: serve
                - containerPort: 8080
                  name: metrics
              volumeMounts:
                - mountPath: /tmp/ray
                  name: ray-logs
                - name: vllm-script
                  mountPath: /home/ray/vllm_serve.py
                  subPath: vllm_serve.py
              resources:
                requests:
                  cpu: "1"
                  memory: "4Gi"
                limits:
                  cpu: "2"
                  memory: "6Gi"
              env:
                - name: MODEL_ID
                  value: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
                - name: PORT
                  value: "8000"
                - name: LD_LIBRARY_PATH
                  value: "/home/ray/anaconda3/lib:$LD_LIBRARY_PATH"
          volumes:
            - name: ray-logs
              emptyDir: {}
            - name: vllm-script
              configMap:
                name: tinyllama-neuron-vllm-serve-script
    workerGroupSpecs:
      - groupName: inf2-group
        replicas: 1
        minReplicas: 1
        maxReplicas: 1
        rayStartParams:
          resources: '"{\"neuron_cores\": 2}"'
        template:
          metadata:
            labels:
              app: tinyllama-neuron-ray-worker
          spec:
            containers:
              - name: ray-worker
                image: public.ecr.aws/data-on-eks/vllm-ray2.32.0-inf2-llama3:latest
                imagePullPolicy: Always
                lifecycle:
                  preStop:
                    exec:
                      command: ["/bin/sh", "-c", "ray stop"]
                resources:
                  requests:
                    cpu: "2"
                    memory: "10Gi"
                    aws.amazon.com/neuroncore: "2"
                  limits:
                    cpu: "3"
                    memory: "14Gi"
                    aws.amazon.com/neuroncore: "2"
                env:
                  - name: MODEL_ID
                    value: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
                  - name: PORT
                    value: "8000"
                  - name: LD_LIBRARY_PATH
                    value: "/home/ray/anaconda3/lib:$LD_LIBRARY_PATH"
                  - name: NEURON_RT_LOG_LEVEL
                    value: "INFO"
                volumeMounts:
                  - mountPath: /tmp/ray
                    name: ray-logs
                  - mountPath: /dev/shm
                    name: dshm
                  - name: vllm-script
                    mountPath: /home/ray/vllm_serve.py
                    subPath: vllm_serve.py
            volumes:
              - name: dshm
                emptyDir:
                  medium: Memory
              - name: ray-logs
                emptyDir: {}
              - name: vllm-script
                configMap:
                  name: tinyllama-neuron-vllm-serve-script
            nodeSelector:
              kubernetes.io/arch: amd64
              workload: neuron
            tolerations:
              - key: aws.amazon.com/neuron
                operator: Equal
                value: "true"
                effect: NoSchedule
              - key: aws.amazon.com/neuroncore
                operator: Exists
                effect: NoSchedule
