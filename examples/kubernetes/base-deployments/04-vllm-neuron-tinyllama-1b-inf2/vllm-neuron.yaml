apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-neuron-tinyllama-1b
  labels:
    app: vllm-neuron-tinyllama-1b
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: vllm-neuron-tinyllama-1b
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: polymarket-signal
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-neuron-tinyllama-1b
  template:
    metadata:
      labels:
        app: vllm-neuron-tinyllama-1b
        app.kubernetes.io/name: vllm
        app.kubernetes.io/instance: vllm-neuron-tinyllama-1b
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: polymarket-signal
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        workload: neuron
      tolerations:
        # Neuron pods can request either:
        # - aws.amazon.com/neuroncore : individual NeuronCores
        # - aws.amazon.com/neuron     : full Neuron devices
        #
        # This example uses neuroncore for a small single-model deployment.
        - key: aws.amazon.com/neuron
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: aws.amazon.com/neuroncore
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vllm-neuron
          # vLLM Neuron requires a custom image built from AWS Neuron DLC and pushed to ECR.
          # Replace this value with your own ECR URI before scaling replicas > 0.
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_REGION>.amazonaws.com/vllm-neuron:latest
          imagePullPolicy: IfNotPresent
          args:
            - --model=TinyLlama/TinyLlama-1.1B-Chat-v1.0
            - --served-model-name=tinyllama-1b-neuron
            - --tokenizer-mode=slow
            - --host=0.0.0.0
            - --port=8000
            - --device=neuron
            - --tensor-parallel-size=1
            - --max-model-len=512
            - --max-num-seqs=1
            - --block-size=2048
            - --swap-space=0
            - --download-dir=/models
            - --guided-decoding-backend=lm-format-enforcer
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: token
                  optional: true
            # Common AWS Neuron runtime knobs you may tune for larger demos:
            #
            # - NEURON_RT_VISIBLE_CORES:
            #   chooses which NeuronCores the process can see.
            #
            # - NEURON_RT_NUM_CORES:
            #   reserves a fixed number of NeuronCores for the process.
            #
            # - NEURON_RT_MULTI_INSTANCE_SHARED_WEIGHTS:
            #   allows multiple instances of the same model to share weights
            #   across different NeuronCores to reduce memory duplication.
            #
            # - NEURON_RT_ASYNC_EXEC_MAX_INFLIGHT_REQUESTS:
            #   controls how many async execution requests can be in flight.
            #
            # These are intentionally not enabled by default here because the
            # best value depends on model size, batch/concurrency, and the
            # target Inferentia instance type.
            #
            # Example:
            # - name: NEURON_RT_NUM_CORES
            #   value: "1"
            # - name: NEURON_RT_ASYNC_EXEC_MAX_INFLIGHT_REQUESTS
            #   value: "2"
          ports:
            - containerPort: 8000
              name: http
          resources:
            # Resource knobs:
            # - aws.amazon.com/neuroncore requests individual cores
            # - aws.amazon.com/neuron requests full devices
            #
            # For Inf2/Trn workloads, the Neuron scheduler extension handles
            # contiguous / topology-aware placement of devices and cores.
            requests:
              cpu: "1500m"
              memory: "10Gi"
              aws.amazon.com/neuroncore: "1"
            limits:
              cpu: "3"
              aws.amazon.com/neuroncore: "1"
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 15
            failureThreshold: 180
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: model-cache
              mountPath: /models
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-neuron-tinyllama-1b
  labels:
    app: vllm-neuron-tinyllama-1b
    app.kubernetes.io/name: vllm
    app.kubernetes.io/instance: vllm-neuron-tinyllama-1b
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: polymarket-signal
spec:
  selector:
    app: vllm-neuron-tinyllama-1b
  ports:
    - name: http
      port: 8000
      targetPort: http
